<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Required: data-origin="settings" tells Homey this is a settings page -->
  <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      padding: 20px;
      color: #222;
    }
    h2 { font-size: 16px; font-weight: 700; color: #1F4E79; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #888; margin-bottom: 16px; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .card h3 {
      font-size: 13px;
      font-weight: 600;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 10px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #888; }
    .info-value { font-weight: 600; }
    .log-box {
      background: #1a1a2e;
      color: #a8d8a8;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.6;
      padding: 12px;
      border-radius: 8px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 350px;
      overflow-y: auto;
      margin-bottom: 12px;
      min-height: 80px;
    }
    .btn {
      display: inline-block;
      padding: 10px 18px;
      background: #1F4E79;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-right: 8px;
      margin-bottom: 8px;
    }
    .btn.secondary { background: #e0e0e0; color: #444; }
    .status { font-size: 12px; color: #27ae60; margin-top: 6px; min-height: 18px; font-weight: 600; }
    .privacy { font-size: 11px; color: #aaa; margin-top: 8px; line-height: 1.5; }
  </style>
</head>
<body>
  <h2>Watts Vision+</h2>
  <div class="subtitle">Diagnostic &amp; Support</div>

  <div class="card">
    <h3>App Info</h3>
    <div class="info-row"><span class="info-label">Version</span><span class="info-value" id="ver">—</span></div>
    <div class="info-row"><span class="info-label">Devices</span><span class="info-value" id="devs">—</span></div>
    <div class="info-row"><span class="info-label">Log entries</span><span class="info-value" id="cnt">—</span></div>
  </div>

  <div class="card">
    <h3>Diagnostic Log</h3>
    <div class="log-box" id="log">Loading…</div>
    <button class="btn" onclick="copyLog()">📋 Copy to clipboard</button>
    <button class="btn secondary" onclick="refreshLog()">↻ Refresh</button>
    <div class="status" id="status"></div>
    <div class="privacy">⚠ Email addresses, MAC addresses and device IDs are automatically redacted.</div>
  </div>

  <script>
    var logText = '';
    var Homey; // will be set by onHomeyReady

    function onHomeyReady(homey) {
      Homey = homey;
      // MUST call Homey.ready() — page stays hidden until this is called
      Homey.ready();
      loadLog();
    }

    function loadLog() {
      Homey.get('diagnosticLog', function(err, log) {
        if (err) {
          document.getElementById('log').textContent = 'Error loading log: ' + err;
          return;
        }
        if (log && log.length > 0) {
          logText = log;
          document.getElementById('log').textContent = log;
        } else {
          logText = '';
          document.getElementById('log').textContent = 'No entries yet — appears after polling starts (up to 30 seconds after install).';
        }
      });

      Homey.get('diagnosticInfo', function(err, info) {
        if (err || !info) return;
        document.getElementById('ver').textContent = info.version || '—';
        document.getElementById('devs').textContent = info.deviceCount !== undefined ? info.deviceCount : '—';
        document.getElementById('cnt').textContent = info.logCount !== undefined ? info.logCount : '—';
      });
    }

    function refreshLog() {
      document.getElementById('log').textContent = 'Refreshing…';
      document.getElementById('status').textContent = '';
      loadLog();
    }

    function copyLog() {
      if (!logText) {
        document.getElementById('status').textContent = 'Nothing to copy yet — refresh first.';
        return;
      }
      var ta = document.createElement('textarea');
      ta.value = logText;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try {
        document.execCommand('copy');
        document.getElementById('status').textContent = '✓ Copied — paste into your support message';
        setTimeout(function(){ document.getElementById('status').textContent = ''; }, 4000);
      } catch(e) {
        document.getElementById('status').textContent = 'Long-press the log text above to copy manually.';
      }
      document.body.removeChild(ta);
    }
  </script>
</body>
</html>
