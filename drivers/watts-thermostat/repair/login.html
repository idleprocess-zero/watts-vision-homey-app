<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="/homey.js" data-origin="repair"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; padding: 20px; background: #f5f5f5; }
    h2 { font-size: 18px; color: #1F4E79; margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
    input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; margin-bottom: 12px; }
    button { width: 100%; padding: 12px; background: #1F4E79; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:disabled { background: #aaa; }
    #log { margin-top: 12px; background: #1a1a2e; color: #a8d8a8; font-family: monospace; font-size: 11px; padding: 10px; border-radius: 8px; white-space: pre-wrap; word-break: break-all; min-height: 80px; max-height: 400px; overflow-y: auto; }
  </style>
</head>
<body>
  <h2>Watts Vision+ debug login</h2>
  <label>E-mailadres</label>
  <input id="username" type="email" placeholder="jouw@email.nl">
  <label>Wachtwoord</label>
  <input id="password" type="password" placeholder="wachtwoord">
  <button id="btn" onclick="doLogin()">Inloggen</button>
  <div id="log">Wacht op invoer...</div>

  <script>
    var Homey;

    function log(msg) {
      var el = document.getElementById('log');
      el.textContent += '\n' + new Date().toISOString().substr(11,8) + ' ' + msg;
      el.scrollTop = el.scrollHeight;
    }

    function onHomeyReady(homey) {
      Homey = homey;
      Homey.ready();
      log('Homey ready ✓');

      // Listen for anything the backend pushes to us
      Homey.on('error', function(err) { log('SERVER PUSH error: ' + JSON.stringify(err)); });
    }

    function doLogin() {
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;
      var btn      = document.getElementById('btn');

      if (!username || !password) { log('Vul beide velden in.'); return; }

      btn.disabled    = true;
      btn.textContent = 'Bezig...';
      log('Emit → login...');

      // Use the raw XMLHttpRequest-style callback Homey uses internally
      // .emit() is a promise but in some Homey webview builds it never resolves
      // So we race it against a timeout to detect hangs
      var done = false;

      var timer = setTimeout(function() {
        if (!done) {
          done = true;
          log('TIMEOUT — emit did not resolve after 15s');
          log('Check app log for [WattsApi] lines');
          log('Try pressing Continue button below if visible');
          btn.disabled    = false;
          btn.textContent = 'Probeer opnieuw';
        }
      }, 15000);

      Homey.emit('login', { username: username, password: password })
        .then(function(result) {
          if (done) { log('Late resolve (after timeout): ' + JSON.stringify(result)); return; }
          done = true;
          clearTimeout(timer);
          log('Result: ' + JSON.stringify(result));
          if (result === true) {
            log('SUCCESS ✓');
            // Don't call nextView — let Homey handle navigation via the Continue button
            // nextView() causes white screen in some SDK versions
            btn.textContent = '✓ Ingelogd — druk op Continue';
          } else {
            log('Unexpected: ' + JSON.stringify(result));
            btn.disabled    = false;
            btn.textContent = 'Probeer opnieuw';
          }
        })
        .catch(function(err) {
          if (done) return;
          done = true;
          clearTimeout(timer);
          log('CATCH: typeof=' + typeof err);
          try { log('JSON: ' + JSON.stringify(err)); } catch(e) {}
          try { log('msg: '  + err.message); }       catch(e) {}
          try { log('str: '  + String(err)); }        catch(e) {}
          btn.disabled    = false;
          btn.textContent = 'Probeer opnieuw';
        });
    }
  </script>
</body>
</html>
