<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Required: Homey injects this at runtime — provides the Homey object -->
  <script src="/homey.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 36px 28px 28px;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }

    .logo {
      margin: 0 auto 20px;
      width: 72px;
      height: 72px;
    }
    .logo svg { width: 100%; height: 100%; }

    .brand-name {
      font-size: 20px;
      font-weight: 700;
      color: #1F4E79;
      margin-bottom: 4px;
    }

    .brand-sub {
      font-size: 13px;
      color: #999;
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 14px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 11px 13px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      color: #222;
      outline: none;
      transition: border-color 0.15s;
      background: white;
    }

    input:focus { border-color: #2E75B6; }

    .btn {
      width: 100%;
      padding: 12px;
      background: #1F4E79;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s;
    }
    .btn:hover   { background: #2E75B6; }
    .btn:active  { background: #163d60; }
    .btn:disabled { background: #bbb; cursor: not-allowed; }

    .error {
      color: #c0392b;
      font-size: 13px;
      margin-top: 10px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="48" fill="#1F4E79"/>
        <text x="50" y="67" font-family="Arial, sans-serif" font-size="52"
              font-weight="bold" fill="white" text-anchor="middle">W</text>
      </svg>
    </div>

    <div class="brand-name">Watts Vision+</div>
    <div class="brand-sub">Sign in with your Watts account</div>

    <!-- id="login" tells 1Password this is a login form -->
    <form id="login" onsubmit="return false;">

      <div class="field">
        <label for="username">Email</label>
        <input
          type="email"
          id="username"
          name="username"
          autocomplete="username email"
          placeholder="your@email.com"
          inputmode="email"
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          autocomplete="current-password"
          placeholder="••••••••"
        />
      </div>

      <button class="btn" id="loginBtn" type="submit">Sign in</button>
    </form>

    <div class="error" id="errorMsg"></div>

  </div>

  <script>
    // Submit on Enter key or button click
    document.getElementById('login').addEventListener('submit', onLogin);

    async function onLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');
      const errEl    = document.getElementById('errorMsg');

      errEl.textContent = '';

      if (!username || !password) {
        errEl.textContent = 'Please enter your email and password.';
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Signing in…';

      try {
        const result = await Homey.emit('login', { username, password });
        if (result === true) {
          Homey.nextView();
        } else {
          errEl.textContent = 'Login failed. Please check your credentials.';
        }
      } catch (err) {
        errEl.textContent = err.message || 'Login failed. Please try again.';
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Sign in';
      }
    }
  </script>
</body>
</html>
